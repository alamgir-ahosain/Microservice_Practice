name: Automate Test Workflows

permissions:
  contents: read
  checks: write

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  # User Service Tests
  user-service:
    name: User Service Tests
    runs-on: ubuntu-latest

    # creates a real Postgres instance inside the GitHub runner
    services:
      user-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: user_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: Project_4/user-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: Project_4/user-service/pom.xml

        #  find on ther  GitHub Service Container

      - name: Build and Test with Maven
        run: mvn -B clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/user_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_EXPIRATION: 86400000
          JWT_REFRESH_EXPIRATION: 604800000
          DEV_SERVER: http://localhost:3000

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-service-test-reports
          path: Project_4/user-service/target/surefire-reports

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: User Service - JUnit Tests
          path: Project_4/user-service/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  # Product Service Tests
  product-service:
    name: Product Service Tests
    runs-on: ubuntu-latest

    services:
      product-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: product_db
        ports:
          - 5435:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: Project_4/product-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: Project_4/product-service/pom.xml

      - name: Build and Test with Maven
        run: mvn -B clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5435/product_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DEV_SERVER: http://localhost:3000

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-service-test-reports
          path: Project_4/product-service/target/surefire-reports

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Product Service - JUnit Tests
          path: Project_4/product-service/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  # Order Service Tests
  order-service:
    name: Order Service Tests
    runs-on: ubuntu-latest

    services:
      order-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: order_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: Project_4/order-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          cache-dependency-path: Project_4/order-service/pom.xml

      - name: Build and Test with Maven
        run: mvn -B clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5434/order_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DEV_SERVER: http://localhost:3000
          USER_URL: http://localhost:8081
          PRODUCT_URL: http://localhost:8083

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-reports
          path: Project_4/order-service/target/surefire-reports

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Order Service - JUnit Tests
          path: Project_4/order-service/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  # All Tests Must Pass (gate job)
  all-tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [user-service, product-service, order-service]
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.user-service.result }}" != "success" ] || \
             [ "${{ needs.product-service.result }}" != "success" ] || \
             [ "${{ needs.order-service.result }}" != "success" ]; then
            echo "One or more service tests failed."
            exit 1
          fi
          echo "All service tests passed."
