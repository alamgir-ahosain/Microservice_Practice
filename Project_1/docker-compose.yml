services:


  product-db:
    image: postgres:16-alpine
    container_name: product-db
    environment:
      POSTGRES_DB: ${PRODUCT_DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5435:5432'
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - microservices-network



  order-db:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: ${ORDER_DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5434:5432'
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - microservices-network



  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - '8081:8081'
    env_file:
      - ./product-service/.env
    depends_on:
      - product-db
    networks:
      - microservices-network



  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - '8083:8083'
    env_file:
      - ./order-service/.env
    depends_on:
      - order-db
      - product-service
    networks:
      - microservices-network



volumes:
  product-db-data:
  order-db-data:



networks:
  microservices-network:
    driver: bridge